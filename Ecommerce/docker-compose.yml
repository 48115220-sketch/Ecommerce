version: "3.8"

services:

  ecommerce:
    container_name: ecommerce
    build:
      context: .
      dockerfile: Dockerfile

    restart: always

    environment:
      - JAVA_OPTS=-XX:-UseContainerSupport

    ports:
      - "8080:8080"

    depends_on:
      - db

    networks:
      - red-backend

    hostname: ecommerce

  db:
    image: mysql:5.7
    container_name: ecommerce-db

    command: --default-authentication-plugin=mysql_native_password

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: ecommercedb
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin

    ports:
      - "3306:3306"

    volumes:
      - ./ecommerce.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql

    networks:
      - red-backend

    hostname: db

volumes:
  mysql_data:

networks:
  red-backend:
    driver: bridge